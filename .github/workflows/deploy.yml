name: Azure WebApp CI/CD

on:
  push:
    branches:
      - main # deploy v1 to production
      - staging # deploy v2 to staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: ./app

      - name: Build app
        run: npm run build --if-present
        working-directory: ./app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure WebApp (Production)
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./app
          # Set environment variable for production
          startup-command: "APP_VERSION=v1 node server.js"

      - name: Deploy to Azure WebApp (Staging Slot)
        if: github.ref == 'refs/heads/staging'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          slot-name: ${{ secrets.AZURE_WEBAPP_SLOT }}
          package: ./app
          # Set environment variable for staging
          startup-command: "APP_VERSION=v2 node server.js"